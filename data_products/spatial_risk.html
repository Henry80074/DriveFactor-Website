function hexToRgb(h){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return [r,g,b];
}
function interpStops(stops,t){
  t=Math.max(0,Math.min(1,t));
  const n=stops.length-1;
  const idx=Math.min(Math.floor(t*n),n-1);
  const f=t*n-idx;
  const [r1,g1,b1]=hexToRgb(stops[idx]);
  const [r2,g2,b2]=hexToRgb(stops[idx+1]);
  return `rgb(${Math.round(r1+f*(r2-r1))},${Math.round(g1+f*(g2-g1))},${Math.round(b1+f*(b2-b1))})`;
}
// green → yellow → red  (crash density / risk maps)
function _rampColor(t){ return interpStops(['#1a9641','#a6d96a','#ffffbf','#fdae61','#d7191c'],t); }
// blue → green → yellow → red  (absolute risk / VKT — full safety ramp)
function _riskRamp(t){ return interpStops(['#2166ac','#1a9641','#ffffbf','#d7191c'],t); }
// grey → yellow → orange → red  (sun glare — no green)
function _glareRamp(t){ return interpStops(['#d1d5db','#e5e7eb','#fef08a','#f97316','#dc2626'],t); }
// light-blue → dark-blue  (absolute risk / VKT)
function _blueRamp(t){ return interpStops(['#deebf7','#9ecae1','#4292c6','#2171b5','#084594'],t); }
// diverging blue→slate→red  (OR curves / dynamic multiplier)
// Centre is #94a3b8 (slate-400) so baseline OR=1.0 roads are clearly visible
// against the white Carto basemap.
function _divRamp(t){ return interpStops(['#1d4ed8','#60a5fa','#94a3b8','#fb923c','#b91c1c'],t); }
// alias for OR (same diverging ramp)
function _orToT(v){const lo=0.85,hi=1.6;if(v<=lo)return 0;if(v>=hi)return 1;return Math.log(v/lo)/Math.log(hi/lo);}
function colOR(v){ return _divRamp(_orToT(v)); }

function t(v){ return Math.max(0,Math.min(1,(v-P5)/(P95-P5))); }
function col(v){ return _rampColor(t(v)); }

const map = L.map('map',{zoomControl:true}).setView([54.563,-1.329],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{

}).addTo(map);

FEATS.forEach(f=>{
  if(!f.latlngs||!f.latlngs.length) return;
  const c=col(f.pred_cpk);
  const w=f.highway==='motorway'||f.highway==='trunk'?5:f.highway==='primary'||f.highway==='secondary'?4:3;
  const line=L.polyline(f.latlngs,{color:c,weight:w,opacity:0.9}).addTo(map);
  const label=f.road_name||f.ref_type||f.highway;
  line.bindTooltip(`
    <div class="tt-title">${label}</div>
    <div class="tt-sub">${f.highway} · ${f.len_km.toFixed(2)} km · ${f.speed_limit||'?'} mph</div>
    <hr class="tt-div">
    <div class="tt-row"><span>Predicted crashes/km/yr</span><span class="tt-val">${f.pred_cpk.toFixed(3)}</span></div>
    <div class="tt-row"><span>Observed crashes (all yrs)</span><span class="tt-val">${f.obs_count}</span></div>
    <div class="tt-row"><span>Risk percentile</span><span class="tt-val">${(t(f.pred_cpk)*100).toFixed(0)}th</span></div>
  `,{className:'df-tooltip',sticky:true});
  line.on('mouseover',function(){this.setStyle({weight:w+2,opacity:1})});
  line.on('mouseout',function(){this.setStyle({weight:w,opacity:0.9})});
});
